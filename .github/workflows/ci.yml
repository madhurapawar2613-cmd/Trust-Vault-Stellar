name: TrustVault CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '20'
  # Deployed testnet contract IDs (2026-06-22)
  NEXT_PUBLIC_ESCROW_CONTRACT_ID: 'CBSC34HVESNUYHA44L7BPJFFCGJEVDIPW2LUI6UFST7NCOU7PCGJVCDB'
  NEXT_PUBLIC_DISPUTE_CONTRACT_ID: 'CD6HNXUQ7OLA742HHYMXN5GEL2ZORLE7STV6UXQK6TCEB2K2ECC2EFN3'
  NEXT_PUBLIC_NETWORK_PASSPHRASE: 'Test SDF Network ; September 2015'
  NEXT_PUBLIC_RPC_URL: 'https://soroban-testnet.stellar.org'
  NEXT_PUBLIC_HORIZON_URL: 'https://horizon-testnet.stellar.org'
  NEXT_PUBLIC_NATIVE_TOKEN: 'CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC'

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1: Rust contract lint + test + WASM build
  # ────────────────────────────────────────────────────────────────────────────
  contract-tests:
    name: 🦀 Contract Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust (stable + wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: cargo-${{ runner.os }}-${{ hashFiles('contracts/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Format check
        working-directory: contracts
        run: cargo fmt --all -- --check

      - name: Lint (clippy)
        working-directory: contracts
        run: cargo clippy --all-targets --features testutils -- -D warnings

      - name: Run contract tests — dispute
        working-directory: contracts
        run: cargo test -p dispute --features testutils -- --nocapture

      - name: Run contract tests — escrow
        working-directory: contracts
        run: |
          # Build dispute WASM first (required for escrow inter-contract import)
          cargo build -p dispute --release --target wasm32-unknown-unknown
          cargo test -p escrow --features testutils -- --nocapture

      - name: Install Stellar CLI
        uses: stellar/stellar-cli@v21.6.0

      - name: Build + optimize WASM artifacts
        working-directory: contracts
        run: |
          cargo build --release --target wasm32-unknown-unknown
          stellar contract optimize --wasm target/wasm32-unknown-unknown/release/dispute.wasm
          stellar contract optimize --wasm target/wasm32-unknown-unknown/release/escrow.wasm
          echo "✅ WASM artifacts built and optimized"
          ls -lh target/wasm32-unknown-unknown/release/*.wasm

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-contracts
          path: |
            contracts/target/wasm32-unknown-unknown/release/dispute.wasm
            contracts/target/wasm32-unknown-unknown/release/dispute.optimized.wasm
            contracts/target/wasm32-unknown-unknown/release/escrow.wasm
            contracts/target/wasm32-unknown-unknown/release/escrow.optimized.wasm
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2: Frontend lint + type-check + test + build
  # ────────────────────────────────────────────────────────────────────────────
  frontend-tests:
    name: ⚛️ Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript type-check
        run: npm run type-check

      - name: ESLint
        run: npm run lint

      - name: Run Jest tests with coverage
        run: npm run test:coverage -- --passWithNoTests
        env:
          CI: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: frontend/coverage
          retention-days: 7

      - name: Build production bundle
        run: npm run build

  # ────────────────────────────────────────────────────────────────────────────
  # Job 3: Deploy to Vercel (main branch only, after both jobs pass)
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [contract-tests, frontend-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.preview-url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: '--prod'

      - name: Comment deployment URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **TrustVault deployed!** Preview: ${{ steps.deploy.outputs.preview-url }}`
            })

  # ────────────────────────────────────────────────────────────────────────────
  # Job 4: Security audit
  # ────────────────────────────────────────────────────────────────────────────
  security-audit:
    name: 🔐 Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cargo audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: npm audit (high severity)
        working-directory: frontend
        run: npm audit --audit-level=high --legacy-peer-deps
        continue-on-error: true
